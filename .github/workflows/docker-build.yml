name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  GHCR_PREFIX: ghcr.io/${{ github.repository_owner }}
  DH_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}/my-chat-server:latest
            ${{ env.GHCR_PREFIX }}/my-chat-server:${{ github.sha }}
            ${{ env.DH_PREFIX }}/my-chat-server:latest
            ${{ env.DH_PREFIX }}/my-chat-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.GHCR_PREFIX }}/my-chat-web:latest
            ${{ env.GHCR_PREFIX }}/my-chat-web:${{ github.sha }}
            ${{ env.DH_PREFIX }}/my-chat-web:latest
            ${{ env.DH_PREFIX }}/my-chat-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID=agent
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
