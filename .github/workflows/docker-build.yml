name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute server tags
        id: server-tags
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/my-chat-server:latest"
          TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/my-chat-server:${{ github.sha }}"
          if [ -n "$DH_USER" ]; then
            TAGS="$TAGS,$DH_USER/my-chat-server:latest"
            TAGS="$TAGS,$DH_USER/my-chat-server:${{ github.sha }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.server-tags.outputs.tags }}
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute web tags
        id: web-tags
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/my-chat-web:latest"
          TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/my-chat-web:${{ github.sha }}"
          if [ -n "$DH_USER" ]; then
            TAGS="$TAGS,$DH_USER/my-chat-web:latest"
            TAGS="$TAGS,$DH_USER/my-chat-web:${{ github.sha }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ steps.web-tags.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_LANGGRAPH_ASSISTANT_ID=agent
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
